<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promise chaining</title>
</head>
<body>
    <script>
        let cart = ["laptop","mobile","earphone", "adaptor"]

        function createorder(cart){
            console.log('creating order...')
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    if (cart.length>0){
                        resolve({
                            orderid:12345,
                            amount:50000
                        })
                    }else{
                        reject('cart is empty')
                    }
                },5000)
            })
        }

        function makepayment(order){
            console.log('initializing paymnet...')
            return new Promise((resolve,reject)=>{
                let network = true;
                setTimeout(()=>{
                    if(network===true){
                        resolve({ 
                            ...order,      // spead operator=...
                            paymentid:'pay123'
                        })
                    }else{
                        reject('payment failed')
                    }
                },5000)
            })
        }

        function updateinventory(order){
            console.log('update inventory')
            return new Promise((resolve,reject)=>{
                let inventoryavailable=true;
                setTimeout(()=>{
                    if(inventoryavailable){
                        resolve({
                            ...order,
                            inventorystatus:true
                        })
                    }else{
                        reject('inventory not available')
                    }
                },5000)
            })
        }

        function orderstatus(order){
            console.log('conforming order')
            return new Promise((resolve,reject)=>{
                let message=true;
                setTimeout(() => {
                    if(message){
                        resolve({
                            ...order,
                            orderstatuskey:"confirmed"
                        })
                    }else{
                        reject('order cancelled')
                    }
                }, 5000);
            })
        }

        createorder(cart).then((order)=>{
            console.log('order created for ',order)
            return makepayment(order)
        }).then((order)=>{
            console.log('payment succesfull',order)
            return updateinventory(order)
        }).then((order)=>{
            console.log('order inventory',order)
            return orderstatus(order)
        }).then((order)=>{
            console.log(order)
            
        }).catch(err=>console.log(err))
    </script>
</body>
</html>
